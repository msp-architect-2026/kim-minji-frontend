stages:
  - build
  - update-helm

variables:
  IMAGE_NAME: gitlab.local:5050/root/kim-minji-frontend
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA

build_and_push:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  tags:
    - arm64
    - docker
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"gitlab.local:5050\":{\"username\":\"$CI_REGISTRY_USER\",\"password\":\"$CI_REGISTRY_PASSWORD\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor --context $CI_PROJECT_DIR --dockerfile $CI_PROJECT_DIR/Dockerfile --build-arg VITE_API_URL=$VITE_API_URL --destination $IMAGE_NAME:$IMAGE_TAG --destination $IMAGE_NAME:latest --insecure --skip-tls-verify
  only:
    - develop
    - main

update-helm:
  stage: update-helm
  image: alpine:latest
  tags:
    - arm64
    - docker
  script:
    - sh update-helm.sh
  only:
    - main